<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unbeatable AI Tic-Tac-Toe</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
        .cell { width: 100px; height: 100px; font-size: 3em; display: flex; align-items: center; justify-content: center; background: #eee; cursor: pointer; border-radius: 8px; }
        .cell:hover { background: #ddd; }
    </style>
</head>
<body>

    <h1>Play Against the Smart Machine</h1>
    <div class="board" id="board"></div>

    <script>
        let boardState = [
            [" ", " ", " "],
            [" ", " ", " "],
            [" ", " ", " "]
        ];

        const boardElement = document.getElementById('board');

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = boardState[r][c];
                    cell.onclick = () => makeHumanMove(r, c);
                    boardElement.appendChild(cell);
                }
            }
        }

        async function makeHumanMove(r, c) {
            if (boardState[r][c] !== " ") return;

            boardState[r][c] = "X";
            createBoard();

            const response = await fetch('/get_move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ board: boardState, ai_symbol: "O" })
            });

            const data = await response.json();
            
            if(data.row !== undefined && data.col !== undefined) {
                boardState[data.row][data.col] = "O";
                createBoard();
            }
        }

        createBoard();
    </script>
</body>
</html>
