<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Unbeatable AI Tic-Tac-Toe</title>
    <style>
        body { font-family: sans-serif; display: flex; flex-direction: column; align-items: center; margin-top: 50px; }
        .board { display: grid; grid-template-columns: repeat(3, 100px); gap: 5px; }
        .cell { width: 100px; height: 100px; font-size: 3em; display: flex; align-items: center; justify-content: center; background: #eee; cursor: pointer; border-radius: 8px; }
        .cell:hover { background: #ddd; }
        #status { margin-bottom: 20px; font-size: 1.5em; font-weight: bold; color: #333; }
    </style>
</head>
<body>

    <h1 id="status">Play Against the Smart Machine</h1>
    <div class="board" id="board"></div>

    <script>
        let boardState = [
            [" ", " ", " "],
            [" ", " ", " "],
            [" ", " ", " "]
        ];
        
        // NEW: These are our locks and referees
        let isGameOver = false;
        let isAiThinking = false;

        const boardElement = document.getElementById('board');
        const statusElement = document.getElementById('status');

        // NEW: The Referee checking for a win on the screen
        function checkWinnerJS() {
            for (let i = 0; i < 3; i++) {
                if (boardState[i][0] === boardState[i][1] && boardState[i][1] === boardState[i][2] && boardState[i][0] !== " ") return boardState[i][0];
                if (boardState[0][i] === boardState[1][i] && boardState[1][i] === boardState[2][i] && boardState[0][i] !== " ") return boardState[0][i];
            }
            if (boardState[0][0] === boardState[1][1] && boardState[1][1] === boardState[2][2] && boardState[0][0] !== " ") return boardState[0][0];
            if (boardState[0][2] === boardState[1][1] && boardState[1][1] === boardState[2][0] && boardState[0][2] !== " ") return boardState[1][1];
            
            let isFull = true;
            for(let r=0; r<3; r++) {
                for(let c=0; c<3; c++) {
                    if(boardState[r][c] === " ") isFull = false;
                }
            }
            if (isFull) return "Draw";
            return null;
        }

        function createBoard() {
            boardElement.innerHTML = '';
            for (let r = 0; r < 3; r++) {
                for (let c = 0; c < 3; c++) {
                    let cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.innerText = boardState[r][c];
                    // Make the cell clickable
                    cell.onclick = () => makeHumanMove(r, c);
                    boardElement.appendChild(cell);
                }
            }
        }

        async function makeHumanMove(r, c) {
            // NEW: The Door Lock. If game is over, AI is thinking, or cell is full, do absolutely nothing!
            if (isGameOver || isAiThinking || boardState[r][c] !== " ") return;

            // 1. You click the square
            boardState[r][c] = "X";
            createBoard();

            // 2. The Referee checks if your move ended the game
            let result = checkWinnerJS();
            if (result) {
                isGameOver = true;
                statusElement.innerText = result === "Draw" ? "It's a draw!" : "You won! (Wait, that's impossible...)";
                return;
            }

            // 3. Lock the door and change the text
            isAiThinking = true;
            statusElement.innerText = "AI is thinking deeply...";

            // 4. Send the board to Python
            const response = await fetch('/get_move', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ board: boardState, ai_symbol: "O" })
            });

            const data = await response.json();
            
            // 5. Python sends the answer back, draw the "O"
            if(data.row !== undefined && data.col !== undefined) {
                boardState[data.row][data.col] = "O";
                createBoard();
            }

            // 6. The Referee checks if the AI's move ended the game
            result = checkWinnerJS();
            if (result) {
                isGameOver = true;
                statusElement.innerText = result === "Draw" ? "🤝 It's a draw!" : "🤖 The AI wins!";
            } else {
                // 7. If no one won, unlock the door for your turn
                isAiThinking = false;
                statusElement.innerText = "Your turn, Human.";
            }
        }

        createBoard();
    </script>
</body>
</html>
